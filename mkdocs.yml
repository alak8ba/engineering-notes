              - ADR-004 Testcontainers Strategy: projects/seaway/adrs/ADR-004-testcontainers-for-integration-tests.md
              - ADR-005 Pull-based Deployment: projects/seaway/adrs/ADR-005-pull-based-deployment-with-watchtower.md
              - ADR-006 CQRS Read Model Strategy: projects/seaway/adrs/ADR-006-cqrs-read-model-strategy.md
              - ADR-007 Domain Events and Outbox: projects/seaway/adrs/ADR-007-domain-events-and-outbox-pattern.md
              - ADR-008 Idempotent Consumers: projects/seaway/adrs/ADR-008-idempotent-consumers-strategy.md
