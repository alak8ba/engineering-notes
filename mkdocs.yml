site_name: Backend Engineering Notes
site_description: Backend architecture, event-driven systems and DevOps patterns
site_author: Aliasoft
extra_css:
  - stylesheets/extra.css

#extra_javascript:
#  - https://unpkg.com/mermaid/dist/mermaid.min.js
plugins:
  - search
  - mermaid2:
      arguments:
        theme: default
extra:
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.tabbed
  - pymdownx.tasklist

theme:
    name: material
    favicon: null
    logo: null
    features:
      - navigation.tabs
      - navigation.sections
      - navigation.expand
      - navigation.top
      - toc.follow
      - content.code.copy
      - search.highlight
      - search.suggest
    custom_dir: overrides
    palette:
      #  Colors:  blue  indigo  teal  cyan  deep purple
      - scheme: default
#        primary: teal
        primary: blue grey
        accent: light blue
        toggle:
          icon: material/toggle-switch
          name: Toggle theme
      - scheme: slate
#        primary: teal
        primary: blue grey
        accent: light blue
        toggle:
          icon: material/toggle-switch-off-outline
          name: Toggle theme


nav:
    - Home: index.md
    - Architecture:
          - CQRS Pattern: topics/architecture/cqrs-pattern.md
          - Hexagonal Architecture: topics/spring/hexagonal-architecture.md
    - Event Driven Systems:
